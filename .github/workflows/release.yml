name: Release Builds

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: raypoketrack-linux
            linux_deps: libgl1-mesa-dev libx11-dev libxrandr-dev libxi-dev libxcursor-dev libxinerama-dev libasound2-dev
            cmake_flags: ""
          - os: ubuntu-24.04-arm
            name: raypoketrack-linux-arm64
            linux_deps: libgl1-mesa-dev libx11-dev libxrandr-dev libxi-dev libxcursor-dev libxinerama-dev libasound2-dev
            cmake_flags: ""
          - os: ubuntu-24.04-arm
            name: raypoketrack-linux-arm64-drm
            linux_deps: libdrm-dev libgbm-dev libgles2-mesa-dev libasound2-dev
            cmake_flags: -DPLATFORM=DRM
          - os: macos-latest
            name: raypoketrack-macos
            linux_deps: ""
            cmake_flags: ""
          - os: windows-latest
            name: raypoketrack-windows
            linux_deps: ""
            cmake_flags: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.linux_deps }}

      - name: Install MinGW (Windows)
        if: runner.os == 'Windows'
        run: choco install mingw -y

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -G "MinGW Makefiles"

      - name: Configure (non-Windows)
        if: runner.os != 'Windows'
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release ${{ matrix.cmake_flags }}

      - name: Build
        run: cmake --build build --parallel

      - name: Zip artifact (Linux)
        if: runner.os == 'Linux'
        run: |
          cp build/raypoketrack raypoketrack
          zip ${{ matrix.name }}.zip raypoketrack

      - name: Zip artifact (macOS)
        if: runner.os == 'macOS'
        run: zip -r ${{ matrix.name }}.zip build/raypoketrack.app

      - name: Zip artifact (Windows)
        if: runner.os == 'Windows'
        run: |
          cp build/raypoketrack.exe raypoketrack.exe
          Compress-Archive -Path raypoketrack.exe -DestinationPath ${{ matrix.name }}.zip

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.name }}.zip

      - name: Upload artifact
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}.zip
