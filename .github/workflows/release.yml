name: Release Builds

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: raypoketrack-linux
          - os: macos-latest
            name: raypoketrack-macos
          - os: windows-latest
            name: raypoketrack-windows

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            libx11-dev \
            libxrandr-dev \
            libxi-dev \
            libxcursor-dev \
            libxinerama-dev \
            libasound2-dev

      - name: Install MinGW (Windows)
        if: runner.os == 'Windows'
        run: choco install mingw -y

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -G "MinGW Makefiles"

      - name: Configure (non-Windows)
        if: runner.os != 'Windows'
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Zip artifact (Linux)
        if: runner.os == 'Linux'
        run: |
          cp build/raypoketrack raypoketrack
          zip ${{ matrix.name }}.zip raypoketrack

      - name: Zip artifact (macOS)
        if: runner.os == 'macOS'
        run: zip -r ${{ matrix.name }}.zip build/raypoketrack.app

      - name: Zip artifact (Windows)
        if: runner.os == 'Windows'
        run: |
          cp build/raypoketrack.exe raypoketrack.exe
          Compress-Archive -Path raypoketrack.exe -DestinationPath ${{ matrix.name }}.zip

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.name }}.zip
